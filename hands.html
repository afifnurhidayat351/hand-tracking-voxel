<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AR Voxel Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share Tech Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;background:#000;overflow:hidden;
    font-family:'Share Tech Mono',monospace;
    display:flex;align-items:center;justify-content:center;
  }

  /* Fixed internal resolution, scaled up via CSS to fill window */
  #app{
    position:relative;
    width:640px;height:480px;
    transform-origin:center center;
  }

  /* Canvas is the ONLY rendering surface — webcam drawn into it by MediaPipe */
  #canvas{
    position:absolute;inset:0;
    width:640px;height:480px;
    display:block;
  }

  /* Hidden video — only used as MediaPipe source */
  #webcam{
    position:absolute;inset:0;
    opacity:0;pointer-events:none;
    width:640px;height:480px;
  }

  #hud{position:absolute;top:12px;left:12px;pointer-events:none;z-index:10;}
  .hl{font-size:12px;letter-spacing:2px;color:rgba(255,80,200,0.65);
    text-shadow:0 0 8px rgba(255,80,200,0.3);line-height:2;}
  .hl span{color:#fff;text-shadow:0 0 5px #fff;}

  #ctrls{position:absolute;bottom:12px;right:12px;pointer-events:none;z-index:10;text-align:right;}
  .ct{font-size:9px;letter-spacing:1.5px;color:rgba(255,80,200,0.35);line-height:2.1;}

  #zoom-bar{
    position:absolute;bottom:12px;left:12px;
    pointer-events:none;z-index:10;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .zl{font-size:9px;letter-spacing:2px;color:rgba(255,80,200,0.4);}
  .ztrack{width:5px;height:70px;background:rgba(255,255,255,0.06);
    border-radius:3px;position:relative;overflow:hidden;}
  .zfill{position:absolute;bottom:0;width:100%;
    background:linear-gradient(0deg,#ff44cc,#00ccff);
    border-radius:3px;transition:height .12s ease;}

  #loading{
    position:absolute;inset:0;background:#000;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;z-index:100;transition:opacity .7s;
  }
  #loading.done{opacity:0;pointer-events:none;}
  #loading p{font-size:12px;letter-spacing:4px;color:#ff44cc;}
  .ld{display:flex;gap:7px;}
  .ld span{width:7px;height:7px;border-radius:50%;background:#ff44cc;animation:ldb 1s infinite;}
  .ld span:nth-child(2){animation-delay:.18s}.ld span:nth-child(3){animation-delay:.36s}
  @keyframes ldb{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="app">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <div id="hud">
    <div class="hl">BLOCKS &nbsp;<span id="hb">0</span></div>
    <div class="hl">LAYER &nbsp;&nbsp;<span id="hly">0</span></div>
    <div class="hl">ZOOM &nbsp;&nbsp;&nbsp;<span id="hzo">1.0x</span></div>
    <div class="hl">MODE &nbsp;&nbsp;&nbsp;<span id="hm">IDLE</span></div>
  </div>

  <div id="zoom-bar">
    <div class="zl">ZOOM</div>
    <div class="ztrack"><div class="zfill" id="zfill" style="height:30%"></div></div>
  </div>

  <div id="ctrls">
    <div class="ct">☝ LEFT INDEX → AIM</div>
    <div class="ct">🤏 PINCH + DRAG → BUILD</div>
    <div class="ct">🤏 THUMB+MIDDLE → DELETE</div>
    <div class="ct">✋ RIGHT PALM → ROTATE</div>
    <div class="ct">🤲 BOTH HANDS SPREAD → ZOOM</div>
  </div>

  <div id="loading">
    <p>LOADING HAND TRACKING</p>
    <div class="ld"><span></span><span></span><span></span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ── Scale #app to fill window ─────────────────────
const appEl = document.getElementById('app');
function scaleApp(){
  const scaleX = window.innerWidth  / 640;
  const scaleY = window.innerHeight / 480;
  const scale  = Math.min(scaleX, scaleY);
  appEl.style.transform = `scale(${scale})`;
}
scaleApp();
window.addEventListener('resize', scaleApp);

// ── Canvas & dims ─────────────────────────────────
const video  = document.getElementById('webcam');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 640, H = 480;

// ── GRID ─────────────────────────────────────────
const COLS=10, ROWS=10, LAYERS=6;
const blocks=Array.from({length:LAYERS},()=>
  Array.from({length:ROWS},()=>Array(COLS).fill(null)));
const PALETTE=['#ff44cc','#ff2299','#cc00ff','#ff6600','#ff3355','#00ccff'];
let blockCount=0;

function setBlock(l,r,c){
  if(l<0||l>=LAYERS||r<0||r>=ROWS||c<0||c>=COLS)return;
  if(blocks[l][r][c])return;
  blocks[l][r][c]=PALETTE[l%PALETTE.length];
  document.getElementById('hb').textContent=++blockCount;
}
function delBlock(l,r,c){
  if(l<0||l>=LAYERS||r<0||r>=ROWS||c<0||c>=COLS)return;
  if(!blocks[l][r][c])return;
  blocks[l][r][c]=null;
  document.getElementById('hb').textContent=Math.max(0,--blockCount);
}

// ── 3D PROJECTION ────────────────────────────────
let tRotY=0.3, tRotX=0.42, cRotY=0.3, cRotX=0.42;
let tZoomRaw=1.0, tZoom=1.0, cZoom=1.0;
const ZOOM_MIN=0.3, ZOOM_MAX=3.5;
const BASE_SCALE=34, PERSP=700;
const ROT_LERP=0.10, ZOOM_LERP=0.08;

function proj(wx,wy,wz){
  const cy=Math.cos(cRotY),sy=Math.sin(cRotY);
  let rx=wx*cy+wz*sy, rz=-wx*sy+wz*cy;
  const cx=Math.cos(cRotX),sx_=Math.sin(cRotX);
  let ry2=wy*cx-rz*sx_, rz2=wy*sx_+rz*cx;
  const d=PERSP/(PERSP+rz2+50);
  const S=BASE_SCALE*cZoom;
  return{x:W/2+rx*S*d, y:H/2+30-ry2*S*d, depth:rz2};
}

function cubeCorners(col,layer,row){
  const wx=col-COLS/2+0.5, wy=layer, wz=row-ROWS/2+0.5, s=0.46;
  return[
    proj(wx-s,wy,wz-s),proj(wx+s,wy,wz-s),
    proj(wx+s,wy,wz+s),proj(wx-s,wy,wz+s),
    proj(wx-s,wy+s*2,wz-s),proj(wx+s,wy+s*2,wz-s),
    proj(wx+s,wy+s*2,wz+s),proj(wx-s,wy+s*2,wz+s),
  ];
}

function drawFace(pts,color,bright,alpha){
  const ax=pts[1].x-pts[0].x,ay=pts[1].y-pts[0].y;
  const bx=pts[2].x-pts[0].x,by=pts[2].y-pts[0].y;
  if(ax*by-ay*bx>0)return;
  const r=parseInt(color.slice(1,3),16);
  const g=parseInt(color.slice(3,5),16);
  const b=parseInt(color.slice(5,7),16);
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  ctx.fillStyle=`rgba(${r*bright|0},${g*bright|0},${b*bright|0},${alpha*0.14})`;
  ctx.fill();
  ctx.strokeStyle=`rgba(${r},${g},${b},${alpha*0.92})`;
  ctx.lineWidth=1.4;
  ctx.shadowColor=color;
  ctx.shadowBlur=alpha<0.6?5:11;
  ctx.stroke();
}

function drawCube(col,layer,row,color,alpha=1){
  const c=cubeCorners(col,layer,row);
  ctx.save();ctx.globalAlpha=alpha;
  [[[ 4,5,6,7],1.0],[[ 0,1,5,4],0.65],
   [[ 1,2,6,5],0.45],[[ 2,3,7,6],0.50],
   [[ 3,0,4,7],0.45],[[ 3,2,1,0],0.25]]
  .forEach(([idx,br])=>drawFace(idx.map(i=>c[i]),color,br,alpha));
  ctx.restore();
}

function vDepth(c,l,r){return proj(c-COLS/2+0.5,l,r-ROWS/2+0.5).depth;}

function drawFloor(layer){
  const hC=COLS/2,hR=ROWS/2,wy=layer;
  ctx.save();ctx.globalAlpha=0.09;
  ctx.strokeStyle=PALETTE[layer%PALETTE.length];
  ctx.lineWidth=0.6;ctx.shadowColor=PALETTE[layer%PALETTE.length];ctx.shadowBlur=3;
  for(let c=0;c<=COLS;c++){
    const p0=proj(c-hC,wy,-hR),p1=proj(c-hC,wy,hR);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++){
    const p0=proj(-hC,wy,r-hR),p1=proj(hC,wy,r-hR);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
  }
  ctx.restore();
}

// ── SKELETON ─────────────────────────────────────
let HC=null;
function drawSkeleton(lm,isRight){
  if(!HC)return;
  const mx=x=>(1-x)*W, my=y=>y*H;
  ctx.save();
  ctx.strokeStyle=isRight?'#00aaff':'#ff44cc';
  ctx.lineWidth=1;ctx.globalAlpha=0.45;
  ctx.shadowColor=isRight?'#00aaff':'#ff44cc';ctx.shadowBlur=4;
  HC.forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(mx(lm[a].x),my(lm[a].y));
    ctx.lineTo(mx(lm[b].x),my(lm[b].y));ctx.stroke();
  });
  lm.forEach((p,i)=>{
    const key=i===4||i===8||i===12;
    ctx.beginPath();ctx.arc(mx(p.x),my(p.y),key?3:1.5,0,Math.PI*2);
    ctx.fillStyle=key?'#fff':(isRight?'#55aaff':'#ff88dd');
    ctx.globalAlpha=key?0.9:0.3;ctx.shadowBlur=key?10:3;
    ctx.fill();
  });
  ctx.restore();
}

// ── UNPROJECT ────────────────────────────────────
function screenToGrid(sx,sy,layer){
  let best=null,bd=Infinity;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p=proj(c-COLS/2+0.5,layer,r-ROWS/2+0.5);
      const d=Math.hypot(sx-p.x,sy-p.y);
      if(d<bd){bd=d;best={col:c,row:r};}
    }
  }
  return bd<55*cZoom?best:null;
}

// ── ZOOM RING ─────────────────────────────────────
function drawZoomRing(lmL,lmR){
  const mx=x=>(1-x)*W,my=y=>y*H;
  const ax=mx(lmL[9].x),ay=my(lmL[9].y);
  const bx=mx(lmR[9].x),by=my(lmR[9].y);
  const midX=(ax+bx)/2,midY=(ay+by)/2;
  const d=Math.hypot(bx-ax,by-ay);
  ctx.save();
  ctx.setLineDash([4,6]);
  ctx.strokeStyle='rgba(0,220,255,0.45)';
  ctx.lineWidth=1.5;ctx.shadowColor='#00ccff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(0,220,255,0.28)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(midX,midY,d/2,0,Math.PI*2);ctx.stroke();
  ctx.font='10px Share Tech Mono';ctx.fillStyle='rgba(0,220,255,0.7)';
  ctx.textAlign='center';
  ctx.fillText(`${cZoom.toFixed(1)}x`,midX,midY-8);
  ctx.restore();
}

// ── STATE ─────────────────────────────────────────
let lastImage=null,lastLMs=[];
let hoverCol=-1,hoverRow=-1,hoverLayer=0;
let fingerX=-1,fingerY=-1,pinchPct=0;
let sIX=0.5,sIY=0.5;
const SM=0.22;

let isDrag=false,lastBC=-1,lastBR=-1,lastBL=-1;
let delLocked=false,lastDel=0;

let rPrevX=null,rPrevY=null;
let rotVelY=0,rotVelX=0;
const ROT_SENS=3.5,ROT_FRICTION=0.88;

let zoomActive=false,zoomBaseDist=null,zoomBaseVal=1.0,zoomDeadPassed=false;
const ZOOM_DEADBAND=0.04;
let lmLeft=null,lmRight=null;

function dist2D(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function twoHandDist(lL,lR){return Math.hypot(lL[9].x-lR[9].x,lL[9].y-lR[9].y);}

// ── MAIN DRAW — called from onResults with results.image ──
function draw(camImage){
  ctx.clearRect(0,0,W,H);

  // Draw mirrored camera feed directly — same as original code
  ctx.save();
  ctx.translate(W,0);ctx.scale(-1,1);
  ctx.drawImage(camImage,0,0,W,H);
  ctx.restore();

  // Dark overlay
  ctx.fillStyle='rgba(0,0,8,0.38)';ctx.fillRect(0,0,W,H);

  drawFloor(hoverLayer);

  // Sort + draw voxels
  const list=[];
  for(let l=0;l<LAYERS;l++)
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<COLS;c++)
        if(blocks[l][r][c])list.push({l,r,c,d:vDepth(c,l,r),color:blocks[l][r][c]});
  list.sort((a,b)=>b.d-a.d);
  list.forEach(v=>drawCube(v.c,v.l,v.r,v.color));

  // Ghost hover block
  if(hoverCol>=0&&hoverRow>=0){
    const pulse=0.28+0.2*Math.sin(Date.now()*0.006);
    drawCube(hoverCol,hoverLayer,hoverRow,'#ffffff',pulse);
  }

  // Skeletons always on top
  lastLMs.forEach(({lm,isRight})=>drawSkeleton(lm,isRight));

  // Zoom ring
  if(zoomActive&&lmLeft&&lmRight)drawZoomRing(lmLeft,lmRight);

  // Finger cursor
  if(fingerX>0&&!zoomActive){
    ctx.save();
    ctx.shadowColor='#fff';ctx.shadowBlur=16;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(fingerX,fingerY,5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.28;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fingerX-14,fingerY);ctx.lineTo(fingerX+14,fingerY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fingerX,fingerY-14);ctx.lineTo(fingerX,fingerY+14);ctx.stroke();
    ctx.restore();
    if(pinchPct>0){
      ctx.save();
      ctx.strokeStyle=PALETTE[hoverLayer];ctx.lineWidth=1.8;
      ctx.globalAlpha=pinchPct*0.85;
      ctx.shadowColor=PALETTE[hoverLayer];ctx.shadowBlur=18;
      ctx.beginPath();ctx.arc(fingerX,fingerY,20+(1-pinchPct)*10,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }
}

// ── ANIM LOOP — only for smooth lerp, draw triggered by MediaPipe ──
function loop(){
  requestAnimationFrame(loop);
  cRotY+=(tRotY-cRotY)*ROT_LERP;
  cRotX+=(tRotX-cRotX)*ROT_LERP;
  tZoom+=(tZoomRaw-tZoom)*0.06;
  cZoom+=(tZoom-cZoom)*ZOOM_LERP;
  if(!rPrevX){
    tRotY+=rotVelY;tRotX+=rotVelX;
    tRotX=Math.max(0.05,Math.min(1.3,tRotX));
    rotVelY*=ROT_FRICTION;rotVelX*=ROT_FRICTION;
    if(Math.abs(rotVelY)<0.0005)rotVelY=0;
    if(Math.abs(rotVelX)<0.0005)rotVelX=0;
  }
  document.getElementById('hzo').textContent=cZoom.toFixed(1)+'x';
  const zPct=((cZoom-ZOOM_MIN)/(ZOOM_MAX-ZOOM_MIN))*100;
  document.getElementById('zfill').style.height=Math.max(4,Math.min(100,zPct))+'%';
}
loop();

// ── MEDIAPIPE CALLBACK ────────────────────────────
function onResults(res){
  document.getElementById('loading').classList.add('done');
  if(!HC&&typeof HAND_CONNECTIONS!=='undefined')HC=HAND_CONNECTIONS;

  lastLMs=[];fingerX=-1;fingerY=-1;pinchPct=0;
  lmLeft=null;lmRight=null;
  let mode='IDLE',rightSeen=false;

  if(res.multiHandLandmarks&&res.multiHandedness){
    for(let i=0;i<res.multiHandLandmarks.length;i++){
      const lm=res.multiHandLandmarks[i];
      const isR=res.multiHandedness[i].label==='Right';
      lastLMs.push({lm,isRight:isR});
      if(isR)lmRight=lm;else lmLeft=lm;
    }

    if(lmLeft&&lmRight){
      // ── ZOOM MODE ──
      zoomActive=true;
      const d=twoHandDist(lmLeft,lmRight);
      if(zoomBaseDist===null){
        zoomBaseDist=d;zoomBaseVal=tZoomRaw;zoomDeadPassed=false;
      } else {
        const delta=d-zoomBaseDist;
        if(!zoomDeadPassed&&Math.abs(delta)>ZOOM_DEADBAND)zoomDeadPassed=true;
        if(zoomDeadPassed){
          const ratio=d/zoomBaseDist;
          const dampedRatio=1+(ratio-1)*0.55;
          tZoomRaw=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomBaseVal*dampedRatio));
        }
      }
      rPrevX=null;rotVelY=0;rotVelX=0;
      mode='🔍 ZOOM';

    } else {
      if(zoomActive){zoomBaseDist=null;zoomDeadPassed=false;zoomBaseVal=tZoomRaw;}
      zoomActive=false;

      if(lmRight){
        rightSeen=true;
        const palmX=lmRight[9].x,palmY=lmRight[9].y;
        if(rPrevX!==null){
          const dx=palmX-rPrevX,dy=palmY-rPrevY;
          if(Math.abs(dx)>0.005||Math.abs(dy)>0.005){
            rotVelY=-dx*ROT_SENS;rotVelX=dy*ROT_SENS;
            tRotY+=rotVelY;tRotX+=rotVelX;
            tRotX=Math.max(0.05,Math.min(1.3,tRotX));
          }
        }
        rPrevX=palmX;rPrevY=palmY;
        mode='ROTATE';
      }

      if(lmLeft){
        const lm=lmLeft;
        const thumb=lm[4],idx8=lm[8],mid=lm[12],wrist=lm[0];
        const dBuild=dist2D(thumb,idx8),dDel=dist2D(thumb,mid);
        const now=Date.now();

        sIX+=(idx8.x-sIX)*SM;sIY+=(idx8.y-sIY)*SM;
        fingerX=(1-sIX)*W;fingerY=sIY*H;
        pinchPct=Math.max(0,Math.min(1,1-dBuild/0.12));

        hoverLayer=Math.round((1-wrist.y)*(LAYERS-1));
        hoverLayer=Math.max(0,Math.min(LAYERS-1,hoverLayer));
        document.getElementById('hly').textContent=hoverLayer;

        const cell=screenToGrid(fingerX,fingerY,hoverLayer);
        if(cell){hoverCol=cell.col;hoverRow=cell.row;}
        else{hoverCol=-1;hoverRow=-1;}

        if(dBuild<0.055){
          isDrag=true;
          if(hoverCol>=0&&hoverRow>=0&&
            (hoverCol!==lastBC||hoverRow!==lastBR||hoverLayer!==lastBL)){
            setBlock(hoverLayer,hoverRow,hoverCol);
            lastBC=hoverCol;lastBR=hoverRow;lastBL=hoverLayer;
          }
          mode='⬛ BUILDING';
        }else{isDrag=false;lastBC=-1;lastBR=-1;lastBL=-1;}

        if(dDel<0.05&&!delLocked&&now-lastDel>320){
          if(hoverCol>=0&&hoverRow>=0)delBlock(hoverLayer,hoverRow,hoverCol);
          lastDel=now;delLocked=true;mode='✕ DELETED';
        }else if(dDel>=0.06)delLocked=false;

        if(mode==='IDLE')mode=dBuild<0.09?'PINCHING…':'AIM';
      }
    }
  }else{
    hoverCol=-1;hoverRow=-1;isDrag=false;
    zoomActive=false;zoomBaseDist=null;zoomDeadPassed=false;
  }

  if(!rightSeen&&!zoomActive)rPrevX=null;
  document.getElementById('hm').textContent=mode;

  // Draw with the fresh camera frame from MediaPipe — exactly like original
  draw(res.image);
}

// ── MEDIAPIPE INIT ────────────────────────────────
const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({
  selfieMode:true,maxNumHands:2,modelComplexity:1,
  minDetectionConfidence:0.72,minTrackingConfidence:0.65
});
hands.onResults(onResults);

const cam=new Camera(video,{
  onFrame:async()=>{await hands.send({image:video});},
  width:640,height:480
});
cam.start();
</script>
</body>
</html>
